<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MCHOSE Style Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0c;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:black;
}

.logo{
font-size:22px;
font-weight:bold;
letter-spacing:2px;
}

nav a{
margin:0 15px;
color:white;
text-decoration:none;
font-size:14px;
}

/* HERO */

.hero{
height:80vh;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1618384887929-16ec33fab9ef");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero button{
padding:14px 35px;
background:white;
border:none;
font-weight:bold;
cursor:pointer;
}

/* PRODUCTS */

.products{
padding:80px 60px;
}

.products h2{
font-size:28px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#161617;
border-radius:10px;
padding:20px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
border-radius:8px;
}

.price{
margin-top:10px;
font-weight:bold;
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
background:black;
margin-top:60px;
}

</style>
</head>

<body>

<header>

<div class="logo">MSTORE</div>

<nav>
<a href="#">Home</a>
<a href="#">Keyboards</a>
<a href="#">Mice</a>
<a href="#">Accessories</a>
</nav>

</header>

<section class="hero">

<h1>Precision Gaming Gear</h1>
<button>SHOP NOW</button>

</section>

<section class="products">

<h2>Featured Products</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">
<h3>Mechanical Keyboard</h3>
<p class="price">$129</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7">
<h3>Ultra Light Mouse</h3>
<p class="price">$59</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1580894732444-8ecded7900cd">
<h3>Gaming Headset</h3>
<p class="price">$139</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587202372634-32705e3bf49c">
<h3>Pro Keyboard</h3>
<p class="price">$149</p>
</div>

</div>

</section>

<footer>

<p>© 2026 Gaming Store</p>

</footer>

</body>
</html>
